name: Build Docker image

permissions:
  id-token: write

on:
  pull_request:
    branches:
      - '*'

jobs:
  build:
    env:
      AWS_ACCOUNT_ID: 551481644935
      AWS_REGION: us-east-1
      REGISTRY_ALIAS: medirks
      REPOSITORY: flaskapp
    name: Build container
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(cat VERSION)
          git fetch origin tag $VERSION 2>/dev/null
          if [ $? -eq 0 ]; then
              echo "$VERSION already exists. Please bump the version up."
              exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "shortsha=$(git log -1 --pretty='format:%h')" >> "$GITHUB_OUTPUT"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4.3.1
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/gha_ecr

      - name: Login to Amazon ECR Public
        id: login-ecr-public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Build, tag, and push docker image to Amazon ECR Public
        env:
          REGISTRY: ${{ steps.login-ecr-public.outputs.registry }}
        run: |
          docker build -t $REGISTRY/$REGISTRY_ALIAS/$REPOSITORY:${{ steps.version.outputs.version }}-${{ steps.version.outputs.shortsha }} .
      #    docker push $REGISTRY/$REGISTRY_ALIAS/$REPOSITORY:$IMAGE_TAG


apiVersion: v1
kind: Namespace
metadata:
  name: flaskapp
spec: {}
status: {}
---

apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: flaskapp
  name: flaskapp
  namespace: flaskapp
spec:
  replicas: 3
  selector:
    matchLabels:
      app: flaskapp
  strategy: {}
  template:
    metadata:
      labels:
        app: flaskapp
    spec:
      containers:
      - image: public.ecr.aws/medirks/flaskapp:0.0.2-amd64
        name: flaskapp
        resources: {}
        env: 
          - name: USER
            value: "testuser"
          - name: DEBUG
            value: "true"
        volumeMounts:
          - name: config-fa
            mountPath: /opt/flaskapp/         
      volumes:
      - name: config-fa
        configMap:
          name: flaskapp-config
          items:
            - key: config.yaml
              path: config.yaml
status: {}
---
apiVersion: v1
data:
  config.yaml: |
    hostname: flaskapp.example.com
    port: 5000
    datacenter: nyc1
kind: ConfigMap
metadata:
  name: flaskapp-config
